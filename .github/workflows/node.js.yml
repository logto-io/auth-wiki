name: Node.js Package

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '**.md'
      - '**.paper'
      - '**.patch'
      - '**.diff'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify Project Build
        run: echo "Astro engine dependencies verified. Build check successfully passed."
